name: Build Kernel for Sirius (SDM710)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build kernel in Docker
        run: |
          cat > build.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          
          cd /kernel
          
          # Clean
          make ARCH=arm64 mrproper
          
          # Generate defconfig
          make ARCH=arm64 sdm670-perf_defconfig
          
          # Apply fragments
          scripts/kconfig/merge_config.sh -m .config arch/arm64/configs/xiaomi/sdm710-common.config
          scripts/kconfig/merge_config.sh -m .config arch/arm64/configs/xiaomi/sirius.config
          make ARCH=arm64 olddefconfig
          
          echo "=== KSU config ==="
          grep CONFIG_KSU .config
          echo "=== Clang version ==="
          $CC --version | head -1
          
          # Build
          make -j$(nproc) ARCH=arm64 \
            CC=$CC \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            Image dtbs 2>&1 | tail -20
          
          echo "=== Build result ==="
          ls -lh arch/arm64/boot/Image 2>&1
          SCRIPT
          
          chmod +x build.sh
          
          docker run --rm \
            -v $(pwd):/kernel \
            -w /kernel \
            -e CC=/clang/bin/clang \
            ghcr.io/nickcao/aosp-clang:main \
            bash -c "
              # Download the exact clang r563880c
              mkdir -p /clang && cd /clang
              wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r563880c.tar.gz -O clang.tar.gz
              tar xzf clang.tar.gz
              
              # Install cross compiler
              apt-get update -qq && apt-get install -y -qq gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi bc flex bison libssl-dev cpio kmod 2>&1 | tail -3
              
              # Run build
              cd /kernel && bash build.sh
            "

      - name: Package artifacts
        if: always()
        run: |
          mkdir -p output
          cp arch/arm64/boot/Image output/ 2>/dev/null || echo "Image not found"
          cp .config output/kernel-config 2>/dev/null || echo "config not found"
          cd output
          echo "Date: $(date -u)" > build-info.txt
          echo "Commit: $(cd .. && git rev-parse --short HEAD)" >> build-info.txt
          ls -lh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-sirius-${{ github.sha }}
          path: output/
          retention-days: 30
