name: Build Rocky7842 Kernel for Sirius

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Checkout Rocky7842 kernel
        run: |
          git clone --depth=1 --single-branch -b lineage-23.2-ksu \
            https://github.com/Rocky7842/android_kernel_xiaomi_sdm710.git kernel
          cd kernel
          git submodule update --init --recursive 2>&1 | tail -5
          echo "=== KSU check ==="
          ls drivers/kernelsu/ | head -5
          grep CONFIG_KSU arch/arm64/configs/xiaomi/sirius.config 2>/dev/null || echo "no KSU in sirius.config"

      - name: Setup build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential bc bison flex libssl-dev libelf-dev \
            cpio kmod gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Setup Clang
        run: |
          mkdir -p /tmp/clang && cd /tmp/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz -O clang.tar.gz
          tar xzf clang.tar.gz
          echo "CC=/tmp/clang/bin/clang" >> $GITHUB_ENV
          echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV
          /tmp/clang/bin/clang --version | head -1

      - name: Build kernel
        run: |
          cd ${{ github.workspace }}/kernel
          
          make ARCH=arm64 mrproper
          make ARCH=arm64 sdm670-perf_defconfig
          scripts/kconfig/merge_config.sh -m .config arch/arm64/configs/xiaomi/sdm710-common.config
          scripts/kconfig/merge_config.sh -m .config arch/arm64/configs/xiaomi/sirius.config
          
          # Enable KSU
          echo "CONFIG_KSU=y" >> .config
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> .config
          echo "CONFIG_KSU_MANUAL_HOOK_AUTO_SETUID_HOOK=y" >> .config
          echo "CONFIG_KSU_MANUAL_HOOK_AUTO_INITRC_HOOK=y" >> .config
          echo "CONFIG_KSU_MANUAL_HOOK_AUTO_INPUT_HOOK=y" >> .config
          
          make ARCH=arm64 olddefconfig
          
          echo "=== KSU config ==="
          grep CONFIG_KSU .config
          
          make -j$(nproc) ARCH=arm64 \
            CC=${{ env.CC }} \
            CLANG_TRIPLE=${{ env.CLANG_TRIPLE }} \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            EXTRA_CFLAGS="-I$(pwd)/drivers/bluetooth" \
            Image 2>&1

      - name: Package artifacts
        if: always()
        run: |
          mkdir -p output
          cd ${{ github.workspace }}/kernel
          cp arch/arm64/boot/Image output/ 2>/dev/null || echo "Image not found"
          cp .config output/kernel-config 2>/dev/null || echo "config not found"
          cd output
          echo "Date: $(date -u)" > build-info.txt
          echo "Source: Rocky7842/android_kernel_xiaomi_sdm710 lineage-23.2-ksu" >> build-info.txt
          ls -lh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-rocky-sirius-${{ github.sha }}
          path: output/
          retention-days: 30
